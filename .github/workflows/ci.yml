name: CI

on:
  pull_request:
    branches: [dev]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - run: npm ci

      - name: Type Check (app/ only)
        run: npx tsc --noEmit --project tsconfig.ci.json

      - name: Lint
        run: npm run lint
